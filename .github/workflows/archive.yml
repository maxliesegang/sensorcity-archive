name: Hourly SensorCity archive

on:
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Diagnose geoportal connectivity
        continue-on-error: true
        run: |
          HOST=geoportal.karlsruhe.de
          URL="https://$HOST/ags04/rest/services/Hosted/Sensordaten_NodeRED/FeatureServer/1/query?where=1=1&returnCountOnly=true&f=json"
          echo "::group::Runner public IP"
          curl -sS --max-time 15 https://api.ipify.org || echo "(could not determine public IP)"
          echo
          echo "::endgroup::"
          echo "::group::DNS resolution"
          getent hosts "$HOST" || true
          nslookup "$HOST" || true
          echo "::endgroup::"
          echo "::group::Raw TCP connect to :443 (10s)"
          timeout 10 bash -c "echo > /dev/tcp/$HOST/443" \
            && echo "TCP connect OK" \
            || echo "TCP connect FAILED (port 443 unreachable)"
          echo "::endgroup::"
          echo "::group::HTTPS request (verbose, 20s)"
          curl -v --max-time 20 \
            -o /dev/null \
            -w "connect=%{time_connect}s total=%{time_total}s http=%{http_code}\n" \
            "$URL" || echo "curl FAILED with exit $?"
          echo "::endgroup::"

      - name: Update archive
        run: npm run archive

      - name: Commit archive changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
          else
            git commit -m "Update sensor archive"
            git push
          fi
